name: Update IMDb Dataset

on:
  schedule:
    # Run daily at 05:00 UTC (IMDb updates their dumps overnight)
    - cron: "0 5 * * *"
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run build script
        run: python scripts/build.py

      - name: Check for changes
        id: changes
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          STAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          EP_COUNT=$(python -c "import json; d=json.load(open('data/meta.json')); print(d['ep_count'])")
          git commit -m "chore: dataset update ${STAMP} (${EP_COUNT} episodes)"
          git push
